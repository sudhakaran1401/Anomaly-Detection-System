{% extends "base.html"%}
{% block content %}

<div class="container vh-100 d-flex align-items-center justify-content-center">

    <div class="card upload-card shadow p-4 col-md-4">

        <!-- Title -->
        <h3 class="text-center mb-2">
            Smart Anomaly Detection
        </h3>

        <p class="text-muted text-center mb-4">
            Login to continue
        </p>

        <!-- Login Form -->
        <form method="post">

            {% csrf_token %}

            <!-- Username -->
            <div class="mb-3">

                <label class="form-label">
                    Username
                </label>

                <input type="text"
                       name="username"
                       class="form-control"
                       placeholder="Enter username">

            </div>

            <!-- Password -->
            <div class="mb-3">

                <label class="form-label">
                    Password
                </label>

                <input type="password"
                       name="password"
                       class="form-control"
                       placeholder="Enter password">

            </div>

            <!-- Button -->
            <button type="submit"
                    class="btn btn-primary w-100 mt-4">

                Login

            </button>

        </form>

    </div>

</div>

{% endblock %}
